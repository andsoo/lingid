<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minu Äpid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Base Light Theme Variables */
        :root {
            --bg-color: #f4f4f9;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --link-bg: #f9fafb;
            --link-hover-bg: #e0e7ff;
            --accent-color: #4f46e5;
            --border-color: #e5e7eb;
        }

        /* Automatic Dark Theme Variables */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #f9fafb;
                --card-bg: #1f2937;
                --link-bg: #374151;
                --link-hover-bg: #4b5563;
                --accent-color: #818cf8;
                --border-color: #4b5563;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed to flex-start so long content scrolls naturally */
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 800px; /* Expanded max-width for column layout */
            padding: 2.5rem 2rem;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            font-size: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 2.5rem 0;
            font-weight: 600;
        }

        /* CSS Grid Setup for Columns */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            text-align: left; /* Align category titles to the left */
        }

        .category-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .category-title {
            font-size: 1.1rem;
            color: var(--text-color);
            font-weight: 600;
            margin: 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-color: var(--link-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-item:hover {
            background-color: var(--link-hover-bg);
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .link-item.disabled {
            pointer-events: none;
            cursor: default;
            opacity: 0.6; /* Visual indicator that it is inactive */
        }

        /* Styling for the "(töös)" indicator */
        .badge {
            font-size: 0.7rem;
            background: var(--accent-color);
            color: white;
            padding: 2px 6px;
            border-radius: 8px;
            margin-left: 8px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-avatar">👋</div>
    
    <h1>Äpid</h1>

    <div class="grid-layout">
        
        <!-- Column Group 1: Lastele -->
        <div class="category-group">
            <h2 class="category-title">Lastele</h2>
            <div class="link-list">
                <a href="https://andsoo.github.io/matemaatika/" class="link-item" target="_blank" rel="noopener noreferrer">Matemaatika võlumaailm</a>
                <a href="https://andsoo.github.io/english/" class="link-item" target="_blank" rel="noopener noreferrer">Keelesõber - õpi inglise keelt</a>
                <a href="https://lugeja-63030115742.us-central1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Tark lugeja</a>
            </div>
        </div>

        <!-- Column Group 2: Avalikud -->
        <div class="category-group">
            <h2 class="category-title">Avalikud</h2>
            <div class="link-list">
                <a href="https://varalaegas-330812544683.europe-west1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Varalaegas</a>
                <div class="link-item disabled">Bensuhinnad <span class="badge">töös</span></div> 
            </div>
        </div>

        <!-- Column Group 3: Isiklikud -->
        <div class="category-group">
            <h2 class="category-title">Isiklikud</h2>
            <div class="link-list">
                <a href="https://bussiajad-330812544683.us-central1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Bussiajad</a>
            </div>
        </div>

        <!-- Column Group 4: Kinnised -->
        <div class="category-group">
            <h2 class="category-title">Kinnised</h2>
            <div class="link-list">
                <a href="https://investeeringud-330812544683.europe-west1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Investeeringute jälgija</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
