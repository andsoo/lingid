<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Link Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Base Light Theme Variables */
        :root {
            --bg-color: #f4f4f9;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --link-bg: #f9fafb;
            --link-hover-bg: #e0e7ff;
            --accent-color: #4f46e5;
            --border-color: #e5e7eb;
        }

        /* Automatic Dark Theme Variables */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #f9fafb;
                --card-bg: #1f2937;
                --link-bg: #374151;
                --link-hover-bg: #4b5563;
                --accent-color: #818cf8;
                --border-color: #4b5563;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem 2rem;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            margin: 20px;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            font-size: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.2);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 600;
        }

        p.bio {
            font-size: 0.95rem;
            opacity: 0.8;
            margin: 0 0 2rem 0;
            line-height: 1.5;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-color: var(--link-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid var(--border-color);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-item:hover {
            background-color: var(--link-hover-bg);
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
	.link-item.disabled {
    	    pointer-events: none; /* Prevents any mouse interaction */
            cursor: default;      /* Forces the standard arrow cursor instead of the clicking hand */
	}
    </style>
</head>
<body>

<div class="container">
    <div class="profile-avatar">👋</div>
    
    <h1>Äpid</h1>

    <div class="link-list">
        <a href="https://andsoo.github.io/matemaatika/" class="link-item" target="_blank" rel="noopener noreferrer">Matemaatika võlumaailm</a>
        <a href="https://andsoo.github.io/english/" class="link-item" target="_blank" rel="noopener noreferrer">Keelesõber - õpi inglise keelt</a>
        <a href="https://lugeja-63030115742.us-central1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Tark lugeja</a>
        <a href="https://varalaegas-330812544683.europe-west1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Varalaegas</a>
        <a href="https://bussiajad-330812544683.us-central1.run.app/" class="link-item" target="_blank" rel="noopener noreferrer">Bussiajad</a>
	<div class="link-item disabled">Investeeringute jälgija (töös)</div>
        <div class="link-item disabled">Bensuhinnad (töös)</div>	
    </div>
</div>

</body>
</html>
